experiment_name: t5-base-lora
model_name: google-t5/t5-base
dataset_name: Salesforce/wikisql

use_full_train: true
train_size: 10000
valid_size: 1000
test_size: 1000

max_input_length: 256
max_target_length: 128

batch_size: 2
gradient_accumulation_steps: 8
epochs: 2
learning_rate: 0.0001
weight_decay: 0.01
seed: 42

use_lora: true
use_8bit: false
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target_modules:
  - q
  - v

output_dir: runs/t5-base-lora
