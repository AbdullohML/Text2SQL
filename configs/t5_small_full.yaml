experiment_name: t5-small-full
model_name: google-t5/t5-small
dataset_name: Salesforce/wikisql

use_full_train: true
train_size: 10000
valid_size: 1000
test_size: 1000

max_input_length: 256
max_target_length: 128

batch_size: 8
gradient_accumulation_steps: 4
epochs: 2
learning_rate: 0.0003
weight_decay: 0.01
seed: 42

use_lora: false
use_8bit: false

output_dir: runs/t5-small-full
